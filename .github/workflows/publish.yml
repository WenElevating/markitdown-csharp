name: publish

on:
  push:
    tags: ['v*']

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Authenticate with GitHub Packages
        run: dotnet nuget update source github -s https://nuget.pkg.github.com/WenElevating/index.json -u WenElevating -p ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --configfile NuGet.Config

      - run: dotnet restore MarkItDown.sln --configfile NuGet.Config

      - run: dotnet build --no-restore -c Release -p:Version=${{ env.VERSION }}

      - run: dotnet test --no-build -c Release

      - run: dotnet pack --no-build -c Release -p:Version=${{ env.VERSION }} -o artifacts/

      - name: Publish to NuGet.org
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: WenMingMing

      - run: dotnet nuget push artifacts/*.nupkg -s https://api.nuget.org/v3/index.json -k ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --skip-duplicate
